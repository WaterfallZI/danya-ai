<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sign in - Danya AI</title><link rel='icon' type='image/svg+xml' href='/icon.svg'><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:#111118;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:36px;width:100%;max-width:380px}.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}.logo-icon{width:36px;height:36px;background:#10a37f;border-radius:9px;display:flex;align-items:center;justify-content:center}.logo-text{font-size:18px;font-weight:800}.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:8px;padding:3px;margin-bottom:24px}.tab{flex:1;padding:8px;border:none;background:none;color:rgba(255,255,255,0.5);font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .15s;font-family:inherit}.tab.active{background:#1a1a2e;color:#fff}.form{display:flex;flex-direction:column;gap:14px}.label{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:5px;display:block}.input{width:100%;background:#0d0d14;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}.input:focus{border-color:rgba(16,163,127,0.6)}.btn{width:100%;padding:11px;background:#10a37f;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px}.btn:hover{background:#0d8f6f}.btn:disabled{opacity:.5;cursor:not-allowed}.alert{padding:10px 14px;border-radius:8px;font-size:13px;display:none}.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}.alert.success{background:rgba(16,163,127,.1);border:1px solid rgba(16,163,127,.3);color:#6ee7b7}</style></head><body><div class='card'><div class='logo'><div class='logo-icon'><svg width='20' height='20' viewBox='0 0 24 24' fill='none'><path d='M12 2L22 20H2L12 2Z' fill='white' opacity='.9'/><path d='M12 8L18 20H6L12 8Z' fill='white' opacity='.4'/></svg></div><span class='logo-text'>Danya AI</span></div><div class='tabs'><button class='tab active' id='tab-login' onclick='switchTab(0)'>Sign in</button><button class='tab' id='tab-reg' onclick='switchTab(1)'>Register</button></div><div id='alert' class='alert'></div><form id='form-login' class='form' onsubmit='handleLogin(event)'><div><label class='label'>Email</label><input class='input' type='email' id='l-email' placeholder='you@example.com' required autocomplete='email'></div><div><label class='label'>Password</label><input class='input' type='password' id='l-pass' placeholder='Password' required autocomplete='current-password'></div><button class='btn' type='submit' id='l-btn'>Sign in</button></form><form id='form-reg' class='form' style='display:none' onsubmit='handleReg(event)'><div><label class='label'>Username</label><input class='input' type='text' id='r-name' placeholder='Your name' required autocomplete='username'></div><div><label class='label'>Email</label><input class='input' type='email' id='r-email' placeholder='you@example.com' required autocomplete='email'></div><div><label class='label'>Password</label><input class='input' type='password' id='r-pass' placeholder='Min 6 characters' required autocomplete='new-password'></div><button class='btn' type='submit' id='r-btn'>Create account</button></form></div><script>function switchTab(i){document.getElementById('form-login').style.display=i===0?'flex':'none';document.getElementById('form-reg').style.display=i===1?'flex':'none';document.getElementById('tab-login').classList.toggle('active',i===0);document.getElementById('tab-reg').classList.toggle('active',i===1);hideAlert()}function showAlert(msg,type){const el=document.getElementById('alert');el.textContent=msg;el.className='alert '+type;el.style.display='block'}function hideAlert(){document.getElementById('alert').style.display='none'}async function handleLogin(e){e.preventDefault();const btn=document.getElementById('l-btn');btn.disabled=true;btn.textContent='Signing in...';try{const r=await fetch('/api/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('l-email').value.trim().toLowerCase(),password:document.getElementById('l-pass').value})});const d=await r.json();if(r.ok){location.href='/chat.html'}else{showAlert(d.error||'Invalid credentials','error')}}catch{showAlert('Network error','error')}finally{btn.disabled=false;btn.textContent='Sign in'}}async function handleReg(e){e.preventDefault();const btn=document.getElementById('r-btn');btn.disabled=true;btn.textContent='Creating...';try{const r=await fetch('/api/auth/register',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('r-name').value.trim(),email:document.getElementById('r-email').value.trim().toLowerCase(),password:document.getElementById('r-pass').value})});const d=await r.json();if(r.ok){location.href='/chat.html'}else{showAlert(d.error||'Registration failed','error')}}catch{showAlert('Network error','error')}finally{btn.disabled=false;btn.textContent='Create account'}}(async()=>{try{const r=await fetch('/api/auth/me',{credentials:'include'});if(r.ok)location.href='/chat.html'}catch{}})();</script></body></html>
